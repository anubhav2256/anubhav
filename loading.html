<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>We'll Be Back Soon!</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <style>
        body {
            background-color: #ffffff;
            font-family: Arial, sans-serif;
            color: #000000;
        }

        .spinner-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            text-align: center;
        }

        .spinner-border {
            width: 3.5rem;
            height: 3.5rem;
            margin-bottom: 20px;
        }

        .message {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        .timer {
            font-size: 1.25rem;
            font-weight: bold;
            color: #007bff;
        }
    </style>
</head>
<body>
    <div class="spinner-container">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
        <p class="message">We'll be back soon !</p>
        <p class="timer" id="timer">00:00:00</p>
    </div>

    <script>
        // Countdown Timer
        let countdownHours = 24; // Set hours for countdown
        let countdownMinutes = 0; // Set minutes for countdown
        let countdownSeconds = (countdownHours * 3600) + (countdownMinutes * 60); 

        const timerElement = document.getElementById('timer');

        const updateTimer = () => {
            const hours = Math.floor(countdownSeconds / 3600);
            const minutes = Math.floor((countdownSeconds % 3600) / 60);
            const seconds = countdownSeconds % 60;

            timerElement.textContent = `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
            
            if (countdownSeconds > 0) {
                countdownSeconds--;
            } else {
                timerElement.textContent = "Time's up!";
            }
        };

        // Update the timer every second
        setInterval(updateTimer, 1000);
    </script>
</body>
</html>
